<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Contracts</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link href="../../static/css/animate.css" rel="stylesheet" th:href="@{/css/animate.css}">
    <link href="../../static/css/style.css" rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fixed-nav">
<div id="wrapper">
    <div th:replace="fragments/template :: side-menu"></div>
    <div id="page-wrapper" class="gray-bg">
        <div th:replace="fragments/template :: top-navbar"></div>
        <div th:replace="fragments/template :: page-heading"></div>
        <div th:replace="fragments/template :: alerts"></div>
        <div class="wrapper wrapper-content animated fadeInRight">
            <div class="ibox">
                <div class="ibox-title"><h5 th:text="${employee.firstName + ' ' + employee.lastName + ' - Contracts'}">Contracts</h5></div>
                <div class="ibox-content">
                    <form th:action="@{'/employees/' + ${employee.id} + '/contracts'}" method="post" enctype="multipart/form-data" th:object="${contractRequest}">
                        <div class="row">
                            <div class="col-md-4 form-group"><label>Contract Name</label><input class="form-control" th:field="*{contractName}"></div>
                            <div class="col-md-3 form-group"><label>Start Date</label><input type="date" class="form-control" th:field="*{startDate}"></div>
                            <div class="col-md-3 form-group"><label>End Date</label><input type="date" class="form-control" th:field="*{endDate}"></div>
                            <div class="col-md-2 form-group"><label>Active</label><select class="form-control" th:field="*{active}"><option th:value="true">Yes</option><option th:value="false">No</option></select></div>
                            <div class="col-md-6 form-group"><label>Contract File</label><input type="file" class="form-control" name="contractFile"></div>
                            <div class="col-md-6 form-group"><label>Notes</label><input class="form-control" th:field="*{notes}"></div>
                        </div>
                        <div class="text-right"><button class="btn btn-success" type="submit">Add Contract</button></div>
                    </form>
                    <hr>
                    <table class="table table-striped table-bordered">
                        <thead><tr><th>Name</th><th>Period</th><th>Active</th><th>Notes</th><th>Document</th></tr></thead>
                        <tbody>
                        <tr th:each="contract : ${employee.contracts}">
                            <td th:text="${contract.contractName}">Contract</td>
                            <td th:text="${(contract.startDate != null ? contract.startDate : '') + ' to ' + (contract.endDate != null ? contract.endDate : '')}">Period</td>
                            <td th:text="${contract.active}">true</td>
                            <td th:text="${contract.notes}">Notes</td>
                            <td>
                                <a th:if="${contract.fileName != null && contract.fileName != ''}"
                                   th:href="@{'/employees/contracts/' + ${contract.id} + '/download'}"
                                   th:text="${contract.fileName}">Download</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(employee.contracts)}"><td colspan="5" class="text-center">No contracts recorded.</td></tr>
                        </tbody>
                    </table>
                    <div class="text-right"><a class="btn btn-warning" th:href="@{'/employees/view-employee/' + ${employee.id}}">Back</a></div>
                </div>
            </div>
        </div>
        <div th:replace="fragments/template :: footer"></div>
    </div>
</div>
</body>
</html>
