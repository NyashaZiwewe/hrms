<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Addresses</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link href="../../static/css/animate.css" rel="stylesheet" th:href="@{/css/animate.css}">
    <link href="../../static/css/style.css" rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fixed-nav">
<div id="wrapper">
    <div th:replace="fragments/template :: side-menu"></div>
    <div id="page-wrapper" class="gray-bg">
        <div th:replace="fragments/template :: top-navbar"></div>
        <div th:replace="fragments/template :: page-heading"></div>
        <div th:replace="fragments/template :: alerts"></div>
        <div class="wrapper wrapper-content animated fadeInRight">
            <div class="ibox">
                <div class="ibox-title"><h5 th:text="${employee.firstName + ' ' + employee.lastName + ' - Addresses'}">Addresses</h5></div>
                <div class="ibox-content">
                    <form th:action="@{'/employees/' + ${employee.id} + '/addresses'}" method="post" th:object="${addressRequest}">
                        <div class="row">
                            <div class="col-md-3 form-group"><label>Province</label><input class="form-control" th:field="*{province}"></div>
                            <div class="col-md-3 form-group"><label>District</label><input class="form-control" th:field="*{district}"></div>
                            <div class="col-md-3 form-group"><label>Street Address</label><input class="form-control" th:field="*{streetAddress}"></div>
                            <div class="col-md-3 form-group"><label>Full Address</label><input class="form-control" th:field="*{address}"></div>
                        </div>
                        <div class="text-right"><button class="btn btn-success" type="submit">Add Address</button></div>
                    </form>
                    <hr>
                    <table class="table table-striped table-bordered">
                        <thead><tr><th>Province</th><th>District</th><th>Street Address</th><th>Full Address</th></tr></thead>
                        <tbody>
                        <tr th:each="address : ${employee.addresses}">
                            <td th:text="${address.province}">Harare</td>
                            <td th:text="${address.district}">Harare</td>
                            <td th:text="${address.streetAddress}">123 Street</td>
                            <td th:text="${address.fullAddress}">123 Street, Harare</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(employee.addresses)}"><td colspan="4" class="text-center">No addresses recorded.</td></tr>
                        </tbody>
                    </table>
                    <div class="text-right"><a class="btn btn-warning" th:href="@{'/employees/view-employee/' + ${employee.id}}">Back</a></div>
                </div>
            </div>
        </div>
        <div th:replace="fragments/template :: footer"></div>
    </div>
</div>
</body>
</html>
