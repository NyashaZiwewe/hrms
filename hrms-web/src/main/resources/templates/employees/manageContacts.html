<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Contacts</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link href="../../static/css/animate.css" rel="stylesheet" th:href="@{/css/animate.css}">
    <link href="../../static/css/style.css" rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fixed-nav">
<div id="wrapper">
    <div th:replace="fragments/template :: side-menu"></div>
    <div id="page-wrapper" class="gray-bg">
        <div th:replace="fragments/template :: top-navbar"></div>
        <div th:replace="fragments/template :: page-heading"></div>
        <div th:replace="fragments/template :: alerts"></div>
        <div class="wrapper wrapper-content animated fadeInRight">
            <div class="ibox">
                <div class="ibox-title"><h5 th:text="${employee.firstName + ' ' + employee.lastName + ' - Related Contacts'}">Contacts</h5></div>
                <div class="ibox-content">
                    <form th:action="@{'/employees/' + ${employee.id} + '/contacts'}" method="post" th:object="${contactRequest}">
                        <div class="row">
                            <div class="col-md-3 form-group">
                                <label>Type</label>
                                <select class="form-control" th:field="*{contactType}">
                                    <option value="">Select Type</option>
                                    <option th:each="relatedContactType : ${relatedContactTypes}" th:value="${relatedContactType}" th:text="${relatedContactType}">Type</option>
                                </select>
                            </div>
                            <div class="col-md-3 form-group"><label>Full Name</label><input class="form-control" th:field="*{fullName}"></div>
                            <div class="col-md-3 form-group"><label>Relationship</label><input class="form-control" th:field="*{relationshipDescription}"></div>
                            <div class="col-md-3 form-group"><label>Phone</label><input class="form-control" th:field="*{phoneNumber}"></div>
                            <div class="col-md-4 form-group"><label>Email</label><input class="form-control" th:field="*{emailAddress}"></div>
                            <div class="col-md-8 form-group"><label>Address</label><input class="form-control" th:field="*{address}"></div>
                        </div>
                        <div class="text-right"><button class="btn btn-success" type="submit">Add Contact</button></div>
                    </form>
                    <hr>
                    <table class="table table-striped table-bordered">
                        <thead><tr><th>Type</th><th>Name</th><th>Relationship</th><th>Phone</th><th>Email</th><th>Address</th></tr></thead>
                        <tbody>
                        <tr th:each="contact : ${employee.relatedContacts}">
                            <td th:text="${contact.contactType}">Type</td>
                            <td th:text="${contact.fullName}">Name</td>
                            <td th:text="${contact.relationshipDescription}">Relationship</td>
                            <td th:text="${contact.phoneNumber}">Phone</td>
                            <td th:text="${contact.emailAddress}">Email</td>
                            <td th:text="${contact.address}">Address</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(employee.relatedContacts)}"><td colspan="6" class="text-center">No related contacts recorded.</td></tr>
                        </tbody>
                    </table>
                    <div class="text-right"><a class="btn btn-warning" th:href="@{'/employees/view-employee/' + ${employee.id}}">Back</a></div>
                </div>
            </div>
        </div>
        <div th:replace="fragments/template :: footer"></div>
    </div>
</div>
</body>
</html>
