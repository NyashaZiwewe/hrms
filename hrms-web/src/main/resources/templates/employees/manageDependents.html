<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Dependants</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link href="../../static/css/animate.css" rel="stylesheet" th:href="@{/css/animate.css}">
    <link href="../../static/css/style.css" rel="stylesheet" th:href="@{/css/style.css}">
    <link href="../../static/css/plugins/datapicker/datepicker3.css" rel="stylesheet" th:href="@{/css/plugins/datapicker/datepicker3.css}">
</head>
<body class="fixed-nav">
<div id="wrapper">
    <div th:replace="fragments/template :: side-menu"></div>
    <div id="page-wrapper" class="gray-bg">
        <div th:replace="fragments/template :: top-navbar"></div>
        <div th:replace="fragments/template :: page-heading"></div>
        <div th:replace="fragments/template :: alerts"></div>
        <div class="wrapper wrapper-content animated fadeInRight">
            <div class="ibox">
                <div class="ibox-title"><h5 th:text="${employee.firstName + ' ' + employee.lastName + ' - Dependants'}">Dependants</h5></div>
                <div class="ibox-content">
                    <form th:action="@{'/employees/' + ${employee.id} + '/dependents'}" method="post" th:object="${dependentRequest}">
                        <div class="row">
                            <div class="col-md-4 form-group"><label>Full Name</label><input class="form-control" th:field="*{fullName}"></div>
                            <div class="col-md-3 form-group"><label>Relationship</label><input class="form-control" th:field="*{relationship}"></div>
                            <div class="col-md-3 form-group"><label>Date Of Birth</label><input type="text" class="form-control js-date-picker" th:field="*{dateOfBirth}"></div>
                            <div class="col-md-12 form-group"><label>Notes</label><input class="form-control" th:field="*{notes}"></div>
                        </div>
                        <div class="text-right"><button class="btn btn-success" type="submit">Add Dependant</button></div>
                    </form>
                    <hr>
                    <table class="table table-striped table-bordered">
                        <thead><tr><th>Name</th><th>Relationship</th><th>Date Of Birth</th><th>Notes</th></tr></thead>
                        <tbody>
                        <tr th:each="dependent : ${employee.dependents}">
                            <td th:text="${dependent.fullName}">Name</td>
                            <td th:text="${dependent.relationship}">Relationship</td>
                            <td th:text="${dependent.dateOfBirth != null ?dependent.dateOfBirth : ''}">DOB</td>
                            <td th:text="${dependent.notes}">Notes</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(employee.dependents)}"><td colspan="4" class="text-center">No dependants recorded.</td></tr>
                        </tbody>
                    </table>
                    <div class="text-right"><a class="btn btn-warning" th:href="@{'/employees/view-employee/' + ${employee.id}}">Back</a></div>
                </div>
            </div>
        </div>
        <div th:replace="fragments/template :: footer"></div>
    </div>
</div>
</body>
</html>
