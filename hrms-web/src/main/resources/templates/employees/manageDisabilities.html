<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Disabilities</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link href="../../static/css/animate.css" rel="stylesheet" th:href="@{/css/animate.css}">
    <link href="../../static/css/style.css" rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fixed-nav">
<div id="wrapper">
    <div th:replace="fragments/template :: side-menu"></div>
    <div id="page-wrapper" class="gray-bg">
        <div th:replace="fragments/template :: top-navbar"></div>
        <div th:replace="fragments/template :: page-heading"></div>
        <div th:replace="fragments/template :: alerts"></div>
        <div class="wrapper wrapper-content animated fadeInRight">
            <div class="ibox">
                <div class="ibox-title"><h5 th:text="${employee.firstName + ' ' + employee.lastName + ' - Disabilities'}">Disabilities</h5></div>
                <div class="ibox-content">
                    <form th:action="@{'/employees/' + ${employee.id} + '/disabilities'}" method="post" th:object="${disabilityRequest}">
                        <div class="row">
                            <div class="col-md-5 form-group"><label>Disability</label><input class="form-control" th:field="*{disabilityName}"></div>
                            <div class="col-md-7 form-group"><label>Notes</label><input class="form-control" th:field="*{notes}"></div>
                        </div>
                        <div class="text-right"><button class="btn btn-success" type="submit">Add Disability</button></div>
                    </form>
                    <hr>
                    <table class="table table-striped table-bordered">
                        <thead><tr><th>Disability</th><th>Notes</th></tr></thead>
                        <tbody>
                        <tr th:each="disability : ${employee.disabilities}">
                            <td th:text="${disability.disabilityName}">Disability</td>
                            <td th:text="${disability.notes}">Notes</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(employee.disabilities)}"><td colspan="2" class="text-center">No disabilities recorded.</td></tr>
                        </tbody>
                    </table>
                    <div class="text-right"><a class="btn btn-warning" th:href="@{'/employees/view-employee/' + ${employee.id}}">Back</a></div>
                </div>
            </div>
        </div>
        <div th:replace="fragments/template :: footer"></div>
    </div>
</div>
</body>
</html>
