<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Leave Request</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link href="../../static/css/animate.css" rel="stylesheet" th:href="@{/css/animate.css}">
    <link href="../../static/css/style.css" rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fixed-nav">
<div id="wrapper">
    <div th:replace="fragments/template :: side-menu"></div>
    <div id="page-wrapper" class="gray-bg">
        <div th:replace="fragments/template :: top-navbar"></div>
        <div th:replace="fragments/template :: page-heading"></div>
        <div th:replace="fragments/template :: alerts"></div>
        <div class="wrapper wrapper-content animated fadeInRight">
            <div class="row">
                <div class="col-lg-12">
                    <div class="ibox">
                        <div class="ibox-title">
                            <h5 th:text="${leaveRequest.employee.firstName + ' ' + leaveRequest.employee.lastName}">Leave Request</h5>
                            <div class="ibox-tools">
                                <a class="btn btn-success btn-sm" th:if="${leaveRequest.status.name() == 'PENDING'}" th:href="@{'/leave/edit-request/' + ${leaveRequest.id}}">Edit</a>
                            </div>
                        </div>
                        <div class="ibox-content">
                            <div class="row">
                                <div class="col-md-4"><strong>Type:</strong> <span th:text="${leaveRequest.leaveType}">ANNUAL</span></div>
                                <div class="col-md-4"><strong>Status:</strong> <span th:text="${leaveRequest.status}">PENDING</span></div>
                                <div class="col-md-4"><strong>Days:</strong> <span th:text="${leaveRequest.daysRequested}">0</span></div>
                                <div class="col-md-6"><strong>Start Date:</strong> <span th:text="${leaveRequest.startDate}">2026-01-01</span></div>
                                <div class="col-md-6"><strong>End Date:</strong> <span th:text="${leaveRequest.endDate}">2026-01-03</span></div>
                                <div class="col-md-12"><strong>Reason:</strong> <span th:text="${leaveRequest.reason}">Reason</span></div>
                            </div>
                            <hr>
                            <form class="form-inline" th:if="${leaveRequest.status.name() == 'PENDING'}" th:action="@{'/leave/decide-request/' + ${leaveRequest.id}}" method="post">
                                <div class="form-group m-r-sm">
                                    <label class="m-r-sm">Manager Employee ID</label>
                                    <input name="managerEmployeeId" class="form-control">
                                </div>
                                <div class="form-group m-r-sm">
                                    <label class="m-r-sm">Decision</label>
                                    <select name="status" class="form-control">
                                        <option value="APPROVED">APPROVED</option>
                                        <option value="REJECTED">REJECTED</option>
                                    </select>
                                </div>
                                <button class="btn btn-primary m-r-sm" type="submit">Submit Decision</button>
                            </form>
                            <form th:action="@{'/leave/delete-request/' + ${leaveRequest.id}}" method="post" class="text-right">
                                <a class="btn btn-warning" th:href="@{/leave}">Back</a>
                                <button class="btn btn-danger" type="submit">Delete</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:replace="fragments/template :: footer"></div>
    </div>
</div>
</body>
</html>
