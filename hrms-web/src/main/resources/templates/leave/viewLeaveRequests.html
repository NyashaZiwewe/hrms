<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link href="../../static/css/animate.css" rel="stylesheet" th:href="@{/css/animate.css}">
    <link href="../../static/css/style.css" rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fixed-nav">
<div id="wrapper">
    <div th:replace="fragments/template :: side-menu"></div>
    <div id="page-wrapper" class="gray-bg">
        <div th:replace="fragments/template :: top-navbar"></div>
        <div th:replace="fragments/template :: page-heading"></div>
        <div th:replace="fragments/template :: alerts"></div>
        <div class="wrapper wrapper-content animated fadeInRight">
            <div class="row">
                <div class="col-lg-12">
                    <div class="ibox">
                        <div class="ibox-title">
                            <h5>Leave Requests</h5>
                            <div class="ibox-tools">
                                <a class="btn btn-primary btn-sm" th:href="@{/leave/types}">Leave Types</a>
                            </div>
                        </div>
                        <div class="ibox-content">
                            <form th:action="@{/leave/save-request}" method="post" th:object="${leaveRequestInput}">
                                <div th:replace="leave/formFields :: leave-form"></div>
                                <div class="text-right">
                                    <button class="btn btn-success" type="submit">Save Leave Request</button>
                                </div>
                            </form>
                            <hr>
                            <div class="table-responsive">
                                <table class="table table-striped table-bordered table-hover">
                                    <thead>
                                    <tr>
                                        <th>Employee</th>
                                        <th>Type</th>
                                        <th>Period</th>
                                        <th>Days</th>
                                        <th>Status</th>
                                        <th></th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="leaveRequest : ${leaveRequests}">
                                        <td th:text="${leaveRequest.employee.firstName + ' ' + leaveRequest.employee.lastName}">Employee</td>
                                        <td th:text="${leaveRequest.leaveType.name}">Vacation Leave</td>
                                        <td th:text="${leaveRequest.startDate + ' to ' + leaveRequest.endDate}">Period</td>
                                        <td th:text="${leaveRequest.daysRequested}">0</td>
                                        <td th:text="${leaveRequest.status}">PENDING</td>
                                        <td><a class="btn btn-primary btn-sm" th:href="@{'/leave/view-request/' + ${leaveRequest.id}}">View</a></td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(leaveRequests)}">
                                        <td colspan="6" class="text-center">No leave requests available.</td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:replace="fragments/template :: footer"></div>
    </div>
</div>
</body>
</html>
