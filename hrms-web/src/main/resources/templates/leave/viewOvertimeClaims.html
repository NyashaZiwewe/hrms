<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overtime Claims</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link href="../../static/css/animate.css" rel="stylesheet" th:href="@{/css/animate.css}">
    <link href="../../static/css/style.css" rel="stylesheet" th:href="@{/css/style.css}">
    <link href="../../static/css/plugins/datapicker/datepicker3.css" rel="stylesheet" th:href="@{/css/plugins/datapicker/datepicker3.css}">
</head>
<body class="fixed-nav">
<div id="wrapper">
    <div th:replace="fragments/template :: side-menu"></div>
    <div id="page-wrapper" class="gray-bg">
        <div th:replace="fragments/template :: top-navbar"></div>
        <div th:replace="fragments/template :: page-heading"></div>
        <div th:replace="fragments/template :: alerts"></div>
        <div class="wrapper wrapper-content animated fadeInRight">
            <div class="row">
                <div class="col-lg-12">
                    <div class="ibox">
                        <div class="ibox-title"><h5>Overtime Claims</h5></div>
                        <div class="ibox-content">
                            <form th:action="@{/leave/save-overtime-claim}" method="post" th:object="${overtimeClaimInput}">
                                <div class="row">
                                    <div class="col-md-4 form-group">
                                        <label>Employee</label>
                                        <select class="form-control" th:field="*{employeeId}">
                                            <option value="">Select Employee</option>
                                            <option th:each="employee : ${employees}" th:value="${employee.id}" th:text="${employee.firstName + ' ' + employee.lastName}">Employee</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4 form-group">
                                        <label>Work Date</label>
                                        <input type="text" class="form-control js-date-picker" th:field="*{workDate}">
                                    </div>
                                    <div class="col-md-4 form-group">
                                        <label>Hours Claimed</label>
                                        <input type="number" step="0.5" min="0.5" class="form-control" th:field="*{hoursClaimed}">
                                    </div>
                                    <div class="col-md-12 form-group">
                                        <label>Reason</label>
                                        <input class="form-control" th:field="*{reason}">
                                    </div>
                                </div>
                                <div class="text-right">
                                    <button class="btn btn-success" type="submit">Submit Overtime Claim</button>
                                </div>
                            </form>
                            <hr>
                            <div class="table-responsive">
                                <table class="table table-striped table-bordered table-hover">
                                    <thead>
                                    <tr>
                                        <th>Employee</th>
                                        <th>Work Date</th>
                                        <th>Hours</th>
                                        <th>Status</th>
                                        <th>Reason</th>
                                        <th>Decision</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="overtimeClaim : ${overtimeClaims}">
                                        <td th:text="${overtimeClaim.employee.firstName + ' ' + overtimeClaim.employee.lastName}">Employee</td>
                                        <td th:text="${overtimeClaim.workDate != null ? overtimeClaim.workDate : ''}">01/01/2026</td>
                                        <td th:text="${overtimeClaim.hoursClaimed}">2.00</td>
                                        <td th:text="${overtimeClaim.status}">PENDING</td>
                                        <td th:text="${overtimeClaim.reason}">Reason</td>
                                        <td>
                                            <form th:if="${overtimeClaim.status.name() == 'PENDING'}"
                                                  th:action="@{'/leave/decide-overtime-claim/' + ${overtimeClaim.id}}"
                                                  method="post"
                                                  class="form-inline">
                                                <input name="managerEmployeeId" class="form-control form-control-sm m-r-sm" placeholder="Manager ID">
                                                <select name="status" class="form-control form-control-sm m-r-sm">
                                                    <option value="APPROVED">APPROVED</option>
                                                    <option value="REJECTED">REJECTED</option>
                                                </select>
                                                <button class="btn btn-primary btn-sm" type="submit">Submit</button>
                                            </form>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(overtimeClaims)}">
                                        <td colspan="6" class="text-center">No overtime claims available.</td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:replace="fragments/template :: footer"></div>
    </div>
</div>
</body>
</html>
