<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link href="../../static/css/animate.css" rel="stylesheet" th:href="@{/css/animate.css}">
    <link href="../../static/css/style.css" rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fixed-nav">
<div id="wrapper">
    <div th:replace="fragments/template :: side-menu"></div>
    <div id="page-wrapper" class="gray-bg">
        <div th:replace="fragments/template :: top-navbar"></div>
        <div th:replace="fragments/template :: page-heading"></div>
        <div th:replace="fragments/template :: alerts"></div>
        <div class="wrapper wrapper-content animated fadeInRight">
            <div class="row" th:each="roleDashboard : ${dashboard.dashboards}">
                <div class="col-lg-12">
                    <div class="ibox">
                        <div class="ibox-title">
                            <h5 th:text="${roleDashboard.audience}">Dashboard Audience</h5>
                        </div>
                        <div class="ibox-content">
                            <div class="row">
                                <div class="col-lg-3 col-sm-6" th:each="metric : ${roleDashboard.metrics}">
                                    <div class="panel panel-default">
                                        <div class="panel-heading" th:text="${metric.metric}">Metric</div>
                                        <div class="panel-body">
                                            <h3 class="no-margins" th:text="${metric.value}">0</h3>
                                            <small th:text="${metric.description}">Description</small>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-lg-12">
                    <div class="ibox">
                        <div class="ibox-title">
                            <h5>Audit Trail</h5>
                        </div>
                        <div class="ibox-content">
                            <div class="table-responsive">
                                <table class="table table-striped table-bordered table-hover">
                                    <thead>
                                    <tr>
                                        <th>Module</th>
                                        <th>Action</th>
                                        <th>Entity</th>
                                        <th>Changed By</th>
                                        <th>Changed At</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="auditTrail : ${auditTrails}">
                                        <td th:text="${auditTrail.moduleName}">employee</td>
                                        <td th:text="${auditTrail.action}">UPDATED</td>
                                        <td th:text="${auditTrail.entityName + ' #' + auditTrail.entityId}">Entity</td>
                                        <td th:text="${auditTrail.changedBy}">system</td>
                                        <td th:text="${auditTrail.changedAt}">2026-01-01T00:00</td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(auditTrails)}">
                                        <td colspan="5" class="text-center">No audit records available.</td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:replace="fragments/template :: footer"></div>
    </div>
</div>
</body>
</html>
