<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Self Review</title><link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}"><link href="../../static/css/animate.css" rel="stylesheet" th:href="@{/css/animate.css}"><link href="../../static/css/style.css" rel="stylesheet" th:href="@{/css/style.css}"></head>
<body class="fixed-nav"><div id="wrapper"><div th:replace="fragments/template :: side-menu"></div><div id="page-wrapper" class="gray-bg"><div th:replace="fragments/template :: top-navbar"></div><div th:replace="fragments/template :: page-heading"></div><div th:replace="fragments/template :: alerts"></div><div class="wrapper wrapper-content animated fadeInRight"><div class="ibox"><div class="ibox-title"><h5>Self Review</h5></div><div class="ibox-content"><form th:action="@{'/performance/self-review/' + ${contract.id}}" method="post" th:object="${performanceReviewRequest}"><table class="table table-striped table-bordered"><thead><tr><th>Goal</th><th>Score</th></tr></thead><tbody><tr th:each="goal, stat : ${goals}"><td th:text="${goal.name}">Goal</td><td><input type="hidden" th:field="*{goalScores[__${stat.index}__].goalId}"><input class="form-control" th:field="*{goalScores[__${stat.index}__].score}"></td></tr></tbody></table><div class="form-group"><label>Comment</label><textarea class="form-control" th:field="*{comment}"></textarea></div><div class="text-right"><a class="btn btn-warning" th:href="@{'/performance/contracts/' + ${contract.id}}">Cancel</a><button class="btn btn-success" type="submit">Submit</button></div></form></div></div></div><div th:replace="fragments/template :: footer"></div></div></div></body>
</html>
