<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Contract</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link href="../../static/css/animate.css" rel="stylesheet" th:href="@{/css/animate.css}">
    <link href="../../static/css/style.css" rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fixed-nav">
<div id="wrapper">
    <div th:replace="fragments/template :: side-menu"></div>
    <div id="page-wrapper" class="gray-bg">
        <div th:replace="fragments/template :: top-navbar"></div>
        <div th:replace="fragments/template :: page-heading"></div>
        <div th:replace="fragments/template :: alerts"></div>
        <div class="wrapper wrapper-content animated fadeInRight">
            <div class="ibox">
                <div class="ibox-title"><h5>Edit Performance Contract</h5></div>
                <div class="ibox-content">
                    <form th:action="@{'/performance/contracts/' + ${contractId} + '/update'}" method="post" th:object="${performanceContractRequest}">
                        <div class="row">
                            <div class="col-md-4 form-group">
                                <label>Employee</label>
                                <select class="form-control" th:field="*{employeeId}">
                                    <option value="">-- Select --</option>
                                    <option th:each="employee : ${employees}" th:value="${employee.id}" th:text="${employee.firstName + ' ' + employee.lastName}">Employee</option>
                                </select>
                            </div>
                            <div class="col-md-4 form-group">
                                <label>Reporting Period</label>
                                <select class="form-control" th:field="*{reportingPeriodId}">
                                    <option value="">-- Select --</option>
                                    <option th:each="period : ${reportingPeriods}" th:value="${period.id}" th:text="${period.name}">Period</option>
                                </select>
                            </div>
                            <div class="col-md-4 form-group">
                                <label>Title</label>
                                <input class="form-control" th:field="*{title}">
                            </div>
                        </div>
                        <div class="text-right">
                            <a class="btn btn-warning" th:href="@{'/performance/contracts/' + ${contractId}}">Cancel</a>
                            <button class="btn btn-success" type="submit">Update</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <div th:replace="fragments/template :: footer"></div>
    </div>
</div>
</body>
</html>
