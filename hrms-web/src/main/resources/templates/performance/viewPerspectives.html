<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Perspectives</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link href="../../static/css/animate.css" rel="stylesheet" th:href="@{/css/animate.css}">
    <link href="../../static/css/style.css" rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fixed-nav">
<div id="wrapper">
    <div th:replace="fragments/template :: side-menu"></div>
    <div id="page-wrapper" class="gray-bg">
        <div th:replace="fragments/template :: top-navbar"></div>
        <div th:replace="fragments/template :: page-heading"></div>
        <div th:replace="fragments/template :: alerts"></div>
        <div class="wrapper wrapper-content animated fadeInRight">
            <div class="ibox">
                <div class="ibox-title">
                    <h5>Perspectives</h5>
                    <div class="ibox-tools">
                        <a class="btn btn-success btn-sm" th:href="@{/performance/perspectives/add}">Add Perspective</a>
                    </div>
                </div>
                <div class="ibox-content">
                    <table class="table table-striped table-bordered">
                        <thead>
                        <tr>
                            <th>Name</th>
                            <th>Description</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="perspective : ${perspectives}">
                            <td th:text="${perspective.name}">Perspective</td>
                            <td th:text="${perspective.description}">Description</td>
                            <td>
                                <a class="btn btn-primary btn-sm" th:href="@{'/performance/perspectives/' + ${perspective.id}}">View</a>
                                <a class="btn btn-success btn-sm" th:href="@{'/performance/perspectives/' + ${perspective.id} + '/edit'}">Edit</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(perspectives)}">
                            <td colspan="3" class="text-center">No perspectives configured.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div th:replace="fragments/template :: footer"></div>
    </div>
</div>
</body>
</html>
