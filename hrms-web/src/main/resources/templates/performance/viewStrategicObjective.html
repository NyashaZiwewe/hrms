<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Strategic Goal</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link href="../../static/css/animate.css" rel="stylesheet" th:href="@{/css/animate.css}">
    <link href="../../static/css/style.css" rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fixed-nav">
<div id="wrapper">
    <div th:replace="fragments/template :: side-menu"></div>
    <div id="page-wrapper" class="gray-bg">
        <div th:replace="fragments/template :: top-navbar"></div>
        <div th:replace="fragments/template :: page-heading"></div>
        <div th:replace="fragments/template :: alerts"></div>
        <div class="wrapper wrapper-content animated fadeInRight">
            <div class="ibox">
                <div class="ibox-title">
                    <h5 th:text="${strategicObjective.name}">Strategic Goal</h5>
                    <div class="ibox-tools">
                        <a class="btn btn-success btn-sm" th:href="@{'/performance/strategic-goals/' + ${strategicObjective.id} + '/edit'}">Edit</a>
                    </div>
                </div>
                <div class="ibox-content">
                    <div class="row">
                        <div class="col-md-6"><strong>Reporting Period:</strong> <span th:text="${strategicObjective.reportingPeriod.name}">Period</span></div>
                        <div class="col-md-6"><strong>Perspective:</strong> <span th:text="${strategicObjective.perspective.name}">Perspective</span></div>
                        <div class="col-md-6"><strong>Status:</strong> <span th:text="${strategicObjective.active ? 'Active' : 'Inactive'}">Active</span></div>
                        <div class="col-md-12"><strong>Description:</strong> <span th:text="${strategicObjective.description}">Description</span></div>
                    </div>
                    <div class="text-right m-t-md">
                        <a class="btn btn-warning" th:href="@{/performance/strategic-goals}">Back</a>
                    </div>
                </div>
            </div>
        </div>
        <div th:replace="fragments/template :: footer"></div>
    </div>
</div>
</body>
</html>
