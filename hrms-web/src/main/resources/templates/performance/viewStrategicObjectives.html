<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Strategic Goals</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link href="../../static/css/animate.css" rel="stylesheet" th:href="@{/css/animate.css}">
    <link href="../../static/css/style.css" rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fixed-nav">
<div id="wrapper">
    <div th:replace="fragments/template :: side-menu"></div>
    <div id="page-wrapper" class="gray-bg">
        <div th:replace="fragments/template :: top-navbar"></div>
        <div th:replace="fragments/template :: page-heading"></div>
        <div th:replace="fragments/template :: alerts"></div>
        <div class="wrapper wrapper-content animated fadeInRight">
            <div class="ibox">
                <div class="ibox-title">
                    <h5>Strategic Goals</h5>
                    <div class="ibox-tools">
                        <a class="btn btn-success btn-sm" th:href="@{/performance/strategic-goals/add}">Add Strategic Goal</a>
                    </div>
                </div>
                <div class="ibox-content">
                    <table class="table table-striped table-bordered">
                        <thead>
                        <tr>
                            <th>Reporting Period</th>
                            <th>Perspective</th>
                            <th>Goal</th>
                            <th>Active</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="objective : ${strategicObjectives}">
                            <td th:text="${objective.reportingPeriod.name}">Period</td>
                            <td th:text="${objective.perspective.name}">Perspective</td>
                            <td th:text="${objective.name}">Goal</td>
                            <td th:text="${objective.active ? 'Yes' : 'No'}">Yes</td>
                            <td>
                                <a class="btn btn-primary btn-sm" th:href="@{'/performance/strategic-goals/' + ${objective.id}}">View</a>
                                <a class="btn btn-success btn-sm" th:href="@{'/performance/strategic-goals/' + ${objective.id} + '/edit'}">Edit</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(strategicObjectives)}">
                            <td colspan="5" class="text-center">No strategic goals configured.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div th:replace="fragments/template :: footer"></div>
    </div>
</div>
</body>
</html>
