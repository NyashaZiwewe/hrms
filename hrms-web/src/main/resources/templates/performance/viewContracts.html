<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link href="../../static/css/animate.css" rel="stylesheet" th:href="@{/css/animate.css}">
    <link href="../../static/css/style.css" rel="stylesheet" th:href="@{/css/style.css}">
    <link href="../../static/css/dashboard.css" rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body class="fixed-nav">
<div id="wrapper">
    <div th:replace="fragments/template :: side-menu"></div>
    <div id="page-wrapper" class="gray-bg">
        <div th:replace="fragments/template :: top-navbar"></div>
        <div th:replace="fragments/template :: page-heading"></div>
        <div th:replace="fragments/template :: alerts"></div>
        <div class="wrapper wrapper-content animated fadeInRight">
            <div class="row">
                <div class="col-lg-12">
                    <div class="ibox">
                        <div class="ibox-title">
                            <h5>Performance Contracts</h5>
                            <div class="ibox-tools">
                                <a class="btn btn-success btn-sm" th:href="@{/performance/contracts/add}">Add Contract</a>
                            </div>
                        </div>
                        <div class="ibox-content">
                            <div class="table-responsive">
                                <table class="table table-striped table-bordered table-hover">
                                    <thead>
                                    <tr>
                                        <th>Employee</th>
                                        <th>Title</th>
                                        <th>Status</th>
                                        <th>Approval</th>
                                        <th>Score</th>
                                        <th></th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="contract : ${contracts}">
                                        <td th:text="${contract.employee.firstName + ' ' + contract.employee.lastName}">Employee</td>
                                        <td th:text="${contract.title}">Contract</td>
                                        <td th:text="${contract.status}">DRAFT</td>
                                        <td th:text="${contract.approvalStatus}">NEW</td>
                                        <td th:text="${contract.agreedScore}">0</td>
                                        <td><a class="btn btn-primary btn-sm" th:href="@{'/performance/contracts/' + ${contract.id}}">View</a></td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(contracts)}">
                                        <td colspan="6" class="text-center">No performance contracts available.</td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:replace="fragments/template :: footer"></div>
    </div>
</div>
</body>
</html>
