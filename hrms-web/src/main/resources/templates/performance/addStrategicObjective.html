<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Strategic Objective</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link href="../../static/css/animate.css" rel="stylesheet" th:href="@{/css/animate.css}">
    <link href="../../static/css/style.css" rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fixed-nav">
<div id="wrapper">
    <div th:replace="fragments/template :: side-menu"></div>
    <div id="page-wrapper" class="gray-bg">
        <div th:replace="fragments/template :: top-navbar"></div>
        <div th:replace="fragments/template :: page-heading"></div>
        <div th:replace="fragments/template :: alerts"></div>
        <div class="wrapper wrapper-content animated fadeInRight">
            <div class="ibox">
                <div class="ibox-title"><h5>Add Strategic Objective</h5></div>
                <div class="ibox-content">
                    <form th:action="@{/performance/strategic-goals/save}" method="post" th:object="${strategicObjectiveRequest}">
                        <div class="row">
                            <div class="col-md-6 form-group">
                                <label>Reporting Period</label>
                                <select class="form-control" th:field="*{reportingPeriodId}">
                                    <option value="">Select Reporting Period</option>
                                    <option th:each="reportingPeriod : ${reportingPeriods}" th:value="${reportingPeriod.id}" th:text="${reportingPeriod.name}">Period</option>
                                </select>
                            </div>
                            <div class="col-md-6 form-group">
                                <label>Perspective</label>
                                <select class="form-control" th:field="*{perspectiveId}">
                                    <option value="">Select Perspective</option>
                                    <option th:each="perspective : ${perspectives}" th:value="${perspective.id}" th:text="${perspective.name}">Perspective</option>
                                </select>
                            </div>
                            <div class="col-md-12 form-group">
                                <label>Strategic Goal</label>
                                <input class="form-control" th:field="*{name}">
                            </div>
                            <div class="col-md-12 form-group">
                                <label>Description</label>
                                <textarea class="form-control" th:field="*{description}"></textarea>
                            </div>
                            <div class="col-md-3 form-group">
                                <label class="d-block">Active</label>
                                <input type="checkbox" th:field="*{active}">
                            </div>
                        </div>
                        <div class="text-right">
                            <a class="btn btn-warning" th:href="@{/performance/strategic-goals}">Cancel</a>
                            <button class="btn btn-success" type="submit">Save</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <div th:replace="fragments/template :: footer"></div>
    </div>
</div>
</body>
</html>
