<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Add Action Plan</title><link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}"><link href="../../static/css/animate.css" rel="stylesheet" th:href="@{/css/animate.css}"><link href="../../static/css/style.css" rel="stylesheet" th:href="@{/css/style.css}"></head>
<body class="fixed-nav"><div id="wrapper"><div th:replace="fragments/template :: side-menu"></div><div id="page-wrapper" class="gray-bg"><div th:replace="fragments/template :: top-navbar"></div><div th:replace="fragments/template :: page-heading"></div><div th:replace="fragments/template :: alerts"></div><div class="wrapper wrapper-content animated fadeInRight"><div class="ibox"><div class="ibox-title"><h5>Add Action Plan</h5></div><div class="ibox-content"><form th:action="@{/performance/save-action-plan}" method="post" th:object="${actionPlanRequest}"><input type="hidden" th:field="*{contractId}"><div class="row"><div class="col-md-6 form-group"><label>Name</label><input class="form-control" th:field="*{name}"></div><div class="col-md-6 form-group"><label>Manager</label><select class="form-control" th:field="*{managerId}"><option value="">-- Select --</option><option th:each="employee : ${employees}" th:value="${employee.id}" th:text="${employee.firstName + ' ' + employee.lastName}">Employee</option></select></div><div class="col-md-6 form-group"><label>Status</label><input class="form-control" th:field="*{status}"></div><div class="col-md-6 form-group"><label>Progress</label><input class="form-control" th:field="*{progress}"></div><div class="col-md-6 form-group"><label>Start Date</label><input type="date" class="form-control" th:field="*{startDate}"></div><div class="col-md-6 form-group"><label>End Date</label><input type="date" class="form-control" th:field="*{endDate}"></div><div class="col-md-12 form-group"><label>Description</label><textarea class="form-control" th:field="*{description}"></textarea></div><div class="col-md-12 form-group"><label>Measure of Success</label><textarea class="form-control" th:field="*{measureOfSuccess}"></textarea></div></div><div class="text-right"><a class="btn btn-warning" th:href="@{'/performance/view-contract/' + ${contract.id}}">Cancel</a><button class="btn btn-success" type="submit">Save</button></div></form></div></div></div><div th:replace="fragments/template :: footer"></div></div></div></body>
</html>
