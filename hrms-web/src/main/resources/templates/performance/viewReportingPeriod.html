<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Reporting Period</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link href="../../static/css/animate.css" rel="stylesheet" th:href="@{/css/animate.css}">
    <link href="../../static/css/style.css" rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fixed-nav">
<div id="wrapper">
    <div th:replace="fragments/template :: side-menu"></div>
    <div id="page-wrapper" class="gray-bg">
        <div th:replace="fragments/template :: top-navbar"></div>
        <div th:replace="fragments/template :: page-heading"></div>
        <div th:replace="fragments/template :: alerts"></div>
        <div class="wrapper wrapper-content animated fadeInRight">
            <div class="ibox">
                <div class="ibox-title">
                    <h5 th:text="${reportingPeriod.name}">Reporting Period</h5>
                    <div class="ibox-tools">
                        <a class="btn btn-success btn-sm" th:href="@{'/performance/reporting-periods/' + ${reportingPeriod.id} + '/edit'}">Edit</a>
                        <form th:action="@{'/performance/reporting-periods/' + ${reportingPeriod.id} + '/delete'}"
                              method="post" style="display:inline-block">
                            <button class="btn btn-danger btn-sm" type="submit">Delete</button>
                        </form>
                    </div>
                </div>
                <div class="ibox-content">
                    <div class="row">
                        <div class="col-md-6"><strong>Name:</strong> <span th:text="${reportingPeriod.name}">2026</span></div>
                        <div class="col-md-6"><strong>Status:</strong> <span th:text="${reportingPeriod.active ? 'ACTIVE' : 'INACTIVE'}">ACTIVE</span></div>
                        <div class="col-md-6"><strong>Start Date:</strong> <span th:text="${reportingPeriod.startDate}">01/01/2026</span></div>
                        <div class="col-md-6"><strong>End Date:</strong> <span th:text="${reportingPeriod.endDate}">31/12/2026</span></div>
                    </div>
                    <div class="text-right m-t-md">
                        <a class="btn btn-warning" th:href="@{/performance/reporting-periods}">Back</a>
                    </div>
                </div>
            </div>
        </div>
        <div th:replace="fragments/template :: footer"></div>
    </div>
</div>
</body>
</html>
