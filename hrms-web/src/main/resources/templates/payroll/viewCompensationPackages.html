<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compensation Packages</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link href="../../static/css/animate.css" rel="stylesheet" th:href="@{/css/animate.css}">
    <link href="../../static/css/style.css" rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fixed-nav">
<div id="wrapper">
    <div th:replace="fragments/template :: side-menu"></div>
    <div id="page-wrapper" class="gray-bg">
        <div th:replace="fragments/template :: top-navbar"></div>
        <div th:replace="fragments/template :: page-heading"></div>
        <div th:replace="fragments/template :: alerts"></div>
        <div class="wrapper wrapper-content animated fadeInRight">
            <div class="ibox">
                <div class="ibox-title">
                    <h5>Compensation Packages</h5>
                    <div class="ibox-tools">
                        <a class="btn btn-success btn-sm" th:href="@{/payroll/add-compensation-package}">Add Package</a>
                    </div>
                </div>
                <div class="ibox-content">
                    <div class="table-responsive">
                        <table class="table table-striped table-bordered table-hover">
                            <thead>
                            <tr>
                                <th>Employee</th>
                                <th>Currency</th>
                                <th>Base Salary</th>
                                <th>Hourly Rate</th>
                                <th></th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="item : ${compensationPackages}">
                                <td th:text="${item.employee.firstName + ' ' + item.employee.lastName}">Employee</td>
                                <td th:text="${item.currencyCode}">USD</td>
                                <td th:text="${item.baseMonthlySalary}">0</td>
                                <td th:text="${item.hourlyRate}">0</td>
                                <td><a class="btn btn-primary btn-sm" th:href="@{'/payroll/view-compensation-package/' + ${item.id}}">View</a></td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(compensationPackages)}">
                                <td colspan="5" class="text-center">No compensation packages available.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        <div th:replace="fragments/template :: footer"></div>
    </div>
</div>
</body>
</html>
