<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Compensation Package</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link href="../../static/css/animate.css" rel="stylesheet" th:href="@{/css/animate.css}">
    <link href="../../static/css/style.css" rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fixed-nav">
<div id="wrapper">
    <div th:replace="fragments/template :: side-menu"></div>
    <div id="page-wrapper" class="gray-bg">
        <div th:replace="fragments/template :: top-navbar"></div>
        <div th:replace="fragments/template :: page-heading"></div>
        <div th:replace="fragments/template :: alerts"></div>
        <div class="wrapper wrapper-content animated fadeInRight">
            <div class="ibox">
                <div class="ibox-title">
                    <h5 th:text="${compensationPackage.employee.firstName + ' ' + compensationPackage.employee.lastName}">Compensation Package</h5>
                    <div class="ibox-tools">
                        <a class="btn btn-success btn-sm" th:href="@{'/payroll/edit-compensation-package/' + ${compensationPackage.id}}">Edit</a>
                    </div>
                </div>
                <div class="ibox-content">
                    <div class="row">
                        <div class="col-md-4"><strong>Currency:</strong> <span th:text="${compensationPackage.currencyCode}">USD</span></div>
                        <div class="col-md-4"><strong>Base Salary:</strong> <span th:text="${compensationPackage.baseMonthlySalary}">0</span></div>
                        <div class="col-md-4"><strong>Hourly Rate:</strong> <span th:text="${compensationPackage.hourlyRate}">0</span></div>
                        <div class="col-md-4"><strong>Monthly Hours:</strong> <span th:text="${compensationPackage.standardMonthlyHours}">0</span></div>
                        <div class="col-md-4"><strong>Income Tax:</strong> <span th:text="${compensationPackage.incomeTaxRate}">0</span></div>
                        <div class="col-md-4"><strong>Social Security:</strong> <span th:text="${compensationPackage.socialSecurityRate}">0</span></div>
                    </div>
                    <hr>
                    <form th:action="@{'/payroll/delete-compensation-package/' + ${compensationPackage.id}}" method="post" class="text-right">
                        <a class="btn btn-warning" th:href="@{/payroll/compensation-packages}">Back</a>
                        <button class="btn btn-danger" type="submit">Delete</button>
                    </form>
                </div>
            </div>
        </div>
        <div th:replace="fragments/template :: footer"></div>
    </div>
</div>
</body>
</html>
