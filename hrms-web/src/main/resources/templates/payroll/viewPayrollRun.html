<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Payroll Run</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link href="../../static/css/animate.css" rel="stylesheet" th:href="@{/css/animate.css}">
    <link href="../../static/css/style.css" rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fixed-nav">
<div id="wrapper">
    <div th:replace="fragments/template :: side-menu"></div>
    <div id="page-wrapper" class="gray-bg">
        <div th:replace="fragments/template :: top-navbar"></div>
        <div th:replace="fragments/template :: page-heading"></div>
        <div th:replace="fragments/template :: alerts"></div>
        <div class="wrapper wrapper-content animated fadeInRight">
            <div class="row">
                <div class="col-lg-12">
                    <div class="ibox">
                        <div class="ibox-title"><h5 th:text="${payrollRun.payrollCode}">Payroll Run</h5></div>
                        <div class="ibox-content">
                            <div class="row">
                                <div class="col-md-3"><strong>Run Currency:</strong> <span th:text="${payrollRun.currencyCode}">USD</span></div>
                                <div class="col-md-3"><strong>Base Currency:</strong> <span th:text="${payrollRun.baseCurrencyCode}">USD</span></div>
                                <div class="col-md-3"><strong>Status:</strong> <span th:text="${payrollRun.status}">POSTED</span></div>
                                <div class="col-md-3"><strong>Gross:</strong> <span th:text="${payrollRun.grossPay}">0</span></div>
                                <div class="col-md-3"><strong>Net:</strong> <span th:text="${payrollRun.netPay}">0</span></div>
                            </div>
                            <hr>
                            <h4>Payroll Entries</h4>
                            <div class="table-responsive">
                                <table class="table table-striped table-bordered">
                                    <thead><tr><th>Employee</th><th>Source Currency</th><th>Rate</th><th>Gross</th><th>Tax</th><th>Net</th></tr></thead>
                                    <tbody>
                                    <tr th:each="entry : ${payrollRun.entries}">
                                        <td th:text="${entry.employeeName}">Employee</td>
                                        <td th:text="${entry.sourceCurrencyCode}">USD</td>
                                        <td th:text="${entry.exchangeRateUsed}">1.000000</td>
                                        <td th:text="${entry.grossPay}">0</td>
                                        <td th:text="${entry.taxAmount}">0</td>
                                        <td th:text="${entry.netPay}">0</td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                            <h4>Run Summary</h4>
                            <div class="row">
                                <div class="col-md-4"><strong>Employees:</strong> <span th:text="${payrollReport.employeeCount}">0</span></div>
                                <div class="col-md-4"><strong>Total Tax:</strong> <span th:text="${payrollReport.totalTax}">0</span></div>
                                <div class="col-md-4"><strong>PAYE Due:</strong> <span th:text="${taxReport.payeDue}">0</span></div>
                            </div>
                            <div class="text-right m-t-md">
                                <a class="btn btn-warning" th:href="@{/payroll}">Back</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:replace="fragments/template :: footer"></div>
    </div>
</div>
</body>
</html>
