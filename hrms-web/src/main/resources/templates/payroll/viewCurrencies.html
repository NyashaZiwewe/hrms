<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll Currencies</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link href="../../static/css/animate.css" rel="stylesheet" th:href="@{/css/animate.css}">
    <link href="../../static/css/style.css" rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fixed-nav">
<div id="wrapper">
    <div th:replace="fragments/template :: side-menu"></div>
    <div id="page-wrapper" class="gray-bg">
        <div th:replace="fragments/template :: top-navbar"></div>
        <div th:replace="fragments/template :: page-heading"></div>
        <div th:replace="fragments/template :: alerts"></div>
        <div class="wrapper wrapper-content animated fadeInRight">
            <div class="row">
                <div class="col-lg-5">
                    <div class="ibox">
                        <div class="ibox-title"><h5>Add Currency</h5></div>
                        <div class="ibox-content">
                            <form th:action="@{/payroll/currencies}" method="post" th:object="${currencyRequest}">
                                <div class="form-group"><label>Code</label><input class="form-control" maxlength="3" th:field="*{code}"></div>
                                <div class="form-group"><label>Name</label><input class="form-control" th:field="*{name}"></div>
                                <div class="form-group"><label>Symbol</label><input class="form-control" th:field="*{symbol}"></div>
                                <div class="checkbox"><label><input type="checkbox" th:field="*{baseCurrency}"> Base currency</label></div>
                                <div class="checkbox"><label><input type="checkbox" th:field="*{active}"> Active</label></div>
                                <button class="btn btn-success" type="submit">Save Currency</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-lg-7">
                    <div class="ibox">
                        <div class="ibox-title"><h5>Configured Currencies</h5></div>
                        <div class="ibox-content table-responsive">
                            <table class="table table-striped table-bordered">
                                <thead><tr><th>Code</th><th>Name</th><th>Symbol</th><th>Base</th><th>Active</th></tr></thead>
                                <tbody>
                                <tr th:each="currency : ${currencies}">
                                    <td th:text="${currency.code}">USD</td>
                                    <td th:text="${currency.name}">United States Dollar</td>
                                    <td th:text="${currency.symbol}">$</td>
                                    <td th:text="${currency.baseCurrency ? 'Yes' : 'No'}">Yes</td>
                                    <td th:text="${currency.active ? 'Yes' : 'No'}">Yes</td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:replace="fragments/template :: footer"></div>
    </div>
</div>
</body>
</html>
