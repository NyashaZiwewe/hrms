<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process Payroll Run</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link href="../../static/css/animate.css" rel="stylesheet" th:href="@{/css/animate.css}">
    <link href="../../static/css/style.css" rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fixed-nav">
<div id="wrapper">
    <div th:replace="fragments/template :: side-menu"></div>
    <div id="page-wrapper" class="gray-bg">
        <div th:replace="fragments/template :: top-navbar"></div>
        <div th:replace="fragments/template :: page-heading"></div>
        <div th:replace="fragments/template :: alerts"></div>
        <div class="wrapper wrapper-content animated fadeInRight">
            <div class="ibox">
                <div class="ibox-title"><h5>Process Payroll Run</h5></div>
                <div class="ibox-content">
                    <form th:action="@{/payroll/process-run}" method="post" th:object="${payrollProcessRequest}">
                        <div class="row">
                            <div class="col-md-4 form-group"><label>Payroll Code</label><input class="form-control" th:field="*{payrollCode}"></div>
                            <div class="col-md-4 form-group">
                                <label>Run Currency</label>
                                <select class="form-control" th:field="*{currencyCode}">
                                    <option value="">-- Select Currency --</option>
                                    <option th:each="currency : ${currencies}"
                                            th:value="${currency.code}"
                                            th:text="${currency.code + ' - ' + currency.name + (currency.baseCurrency ? ' (Base)' : '')}">Currency</option>
                                </select>
                                <small class="text-muted" th:text="'Base currency: ' + ${baseCurrency.code}">Base currency</small>
                            </div>
                            <div class="col-md-4 form-group"><label>Pay Date</label><input type="date" class="form-control" th:field="*{payDate}"></div>
                            <div class="col-md-6 form-group"><label>Period Start</label><input type="date" class="form-control" th:field="*{periodStart}"></div>
                            <div class="col-md-6 form-group"><label>Period End</label><input type="date" class="form-control" th:field="*{periodEnd}"></div>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-striped table-bordered">
                                <thead>
                                <tr>
                                    <th>Employee</th>
                                    <th>Hours</th>
                                    <th>Overtime</th>
                                    <th>Bonus</th>
                                    <th>Other Deductions</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="input, stat : *{employees}">
                                    <td>
                                        <span th:text="${employees[stat.index].firstName + ' ' + employees[stat.index].lastName}">Employee</span>
                                        <input type="hidden" th:field="*{employees[__${stat.index}__].employeeId}">
                                    </td>
                                    <td><input class="form-control" th:field="*{employees[__${stat.index}__].hoursWorked}"></td>
                                    <td><input class="form-control" th:field="*{employees[__${stat.index}__].overtimeHours}"></td>
                                    <td><input class="form-control" th:field="*{employees[__${stat.index}__].bonus}"></td>
                                    <td><input class="form-control" th:field="*{employees[__${stat.index}__].otherDeductions}"></td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="text-right">
                            <a class="btn btn-warning" th:href="@{/payroll}">Cancel</a>
                            <button class="btn btn-success" type="submit">Process</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <div th:replace="fragments/template :: footer"></div>
    </div>
</div>
</body>
</html>
