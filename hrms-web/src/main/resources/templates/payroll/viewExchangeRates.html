<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exchange Rates</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link href="../../static/css/animate.css" rel="stylesheet" th:href="@{/css/animate.css}">
    <link href="../../static/css/style.css" rel="stylesheet" th:href="@{/css/style.css}">
    <link href="../../static/css/plugins/datapicker/datepicker3.css" rel="stylesheet" th:href="@{/css/plugins/datapicker/datepicker3.css}">
</head>
<body class="fixed-nav">
<div id="wrapper">
    <div th:replace="fragments/template :: side-menu"></div>
    <div id="page-wrapper" class="gray-bg">
        <div th:replace="fragments/template :: top-navbar"></div>
        <div th:replace="fragments/template :: page-heading"></div>
        <div th:replace="fragments/template :: alerts"></div>
        <div class="wrapper wrapper-content animated fadeInRight">
            <div class="row">
                <div class="col-lg-5">
                    <div class="ibox">
                        <div class="ibox-title"><h5>Add Exchange Rate</h5></div>
                        <div class="ibox-content">
                            <form th:action="@{/payroll/exchange-rates}" method="post" th:object="${exchangeRateRequest}">
                                <div class="form-group">
                                    <label>Currency</label>
                                    <select class="form-control" th:field="*{currencyCode}">
                                        <option value="">-- Select Currency --</option>
                                        <option th:each="currency : ${currencies}"
                                                th:value="${currency.code}"
                                                th:text="${currency.code + ' - ' + currency.name + (currency.baseCurrency ? ' (Base)' : '')}">Currency</option>
                                    </select>
                                </div>
                                <div class="form-group"><label>Effective Date</label><input type="text" class="form-control js-date-picker" th:field="*{effectiveDate}"></div>
                                <div class="form-group">
                                    <label>Rate To Base Currency</label>
                                    <input class="form-control" th:field="*{rateToBase}">
                                    <small class="text-muted" th:text="'1 selected currency = rate in ' + ${baseCurrency.code}">Rate hint</small>
                                </div>
                                <div class="form-group"><label>Notes</label><textarea class="form-control" th:field="*{notes}"></textarea></div>
                                <button class="btn btn-success" type="submit">Save Exchange Rate</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-lg-7">
                    <div class="ibox">
                        <div class="ibox-title"><h5>Exchange Rate History</h5></div>
                        <div class="ibox-content table-responsive">
                            <table class="table table-striped table-bordered">
                                <thead><tr><th>Currency</th><th>Effective Date</th><th>Rate To Base</th><th>Notes</th></tr></thead>
                                <tbody>
                                <tr th:each="exchangeRate : ${exchangeRates}">
                                    <td th:text="${exchangeRate.currency.code}">USD</td>
                                    <td th:text="${exchangeRate.effectiveDate != null ? exchangeRate.effectiveDate : ''}">30/03/2026</td>
                                    <td th:text="${exchangeRate.rateToBase}">1.000000</td>
                                    <td th:text="${exchangeRate.notes}">Note</td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:replace="fragments/template :: footer"></div>
    </div>
</div>
</body>
</html>
