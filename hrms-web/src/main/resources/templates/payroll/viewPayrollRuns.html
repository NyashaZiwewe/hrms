<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link href="../../static/css/animate.css" rel="stylesheet" th:href="@{/css/animate.css}">
    <link href="../../static/css/style.css" rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fixed-nav">
<div id="wrapper">
    <div th:replace="fragments/template :: side-menu"></div>
    <div id="page-wrapper" class="gray-bg">
        <div th:replace="fragments/template :: top-navbar"></div>
        <div th:replace="fragments/template :: page-heading"></div>
        <div th:replace="fragments/template :: alerts"></div>
        <div class="wrapper wrapper-content animated fadeInRight">
            <div class="row">
                <div class="col-lg-12">
                    <div class="ibox">
                        <div class="ibox-title">
                            <h5>Payroll Runs</h5>
                            <div class="ibox-tools">
                                <a class="btn btn-default btn-sm" th:href="@{/payroll/compensation-packages}">Comp Packages</a>
                                <a class="btn btn-success btn-sm" th:href="@{/payroll/process-run}">Process Run</a>
                            </div>
                        </div>
                        <div class="ibox-content">
                            <div class="table-responsive">
                                <table class="table table-striped table-bordered table-hover">
                                    <thead>
                                    <tr>
                                        <th>Code</th>
                                        <th>Currency</th>
                                        <th>Period</th>
                                        <th>Gross</th>
                                        <th>Net</th>
                                        <th>Status</th>
                                        <th></th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="run : ${payrollRuns}">
                                        <td th:text="${run.payrollCode}">PR001</td>
                                        <td th:text="${run.currencyCode}">USD</td>
                                        <td th:text="${run.periodStart + ' to ' + run.periodEnd}">Period</td>
                                        <td th:text="${run.grossPay}">0.00</td>
                                        <td th:text="${run.netPay}">0.00</td>
                                        <td th:text="${run.status}">DRAFT</td>
                                        <td><a class="btn btn-primary btn-sm" th:href="@{'/payroll/view-run/' + ${run.id}}">View</a></td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(payrollRuns)}">
                                        <td colspan="7" class="text-center">No payroll runs available.</td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:replace="fragments/template :: footer"></div>
    </div>
</div>
</body>
</html>
